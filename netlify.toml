# Deploy desde la raíz del repo. Sin `base`: publish y functions son rutas claras desde la raíz.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "20"
  # Netlify define CI=true; webpack a veces trata warnings como error. Desactiva ESLint en el bundle de prod (el IDE sigue pudiendo lintear).
  DISABLE_ESLINT_PLUGIN = "true"
  # Evita fallos por límites de memoria al empaquetar funciones grandes (api + firebase-admin)
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  directory = "frontend/netlify/functions"

[[redirects]]
  from = "/api/json/leads"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/json/metrics"
  to = "/.netlify/functions/metrics"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
