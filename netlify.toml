# `base = "frontend"`: el build corre dentro de frontend/ (coincide con Base directory en Netlify).
# No uses `cd frontend` en el command si el base ya es frontend.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  # Netlify pone CI=true; CRA trata warnings de webpack como error y tumba el build.
  CI = "false"
  DISABLE_ESLINT_PLUGIN = "true"
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/json/leads"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/json/metrics"
  to = "/.netlify/functions/metrics"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
