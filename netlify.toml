# Deploy desde la raíz del repo: el sitio vive en /frontend
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  # Relativo a `base` (frontend/), no a la raíz del repo
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# Funciones en frontend/netlify/functions (api.js = Express + Firestore; leads*.js = JSON temporal)
[functions]
  # Relativo a `base` → frontend/netlify/functions
  directory = "netlify/functions"

# JSON test API (Make.com puede usar /.netlify/functions/leads-intake directo)
# No usamos /api/* -> :splat porque rompería /api/auth/*, /api/leads/:id, /api/dashboard/metrics, etc.
[[redirects]]
  from = "/api/json/leads"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/json/metrics"
  to = "/.netlify/functions/metrics"
  status = 200

# App principal (JWT, Firestore, CRM)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# SPA (después de API)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
